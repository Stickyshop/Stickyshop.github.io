<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky Shop | Shop ✨</title>
    <style>
        :root {
            --primary-red: #ff4d4d;
            --light-red: #ffe5e5;
            --dark-red: #d90429;
            --soft-cream: #fffafa;
            --text-color: #332222;
            --accent-gold: #d4af37;
            --border-color: #f1dbdb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--soft-cream);
            color: var(--text-color);
            line-height: 1.6;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 0;
        }

        header {
            background-color: #ffffff;
            border-bottom: 2px solid var(--light-red);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--dark-red);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--dark-red);
        }

        .hero {
            background: linear-gradient(135deg, var(--light-red) 0%, #fff0f0 100%);
            padding: 80px 5%;
            text-align: center;
            border-radius: 0 0 50px 50px;
            margin-bottom: 40px;
        }

        .hero h1 {
            font-size: 42px;
            color: var(--dark-red);
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 18px;
            color: #5c4545;
        }

        #product-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 10px 0;
        }

        .product-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid var(--primary-red);
            transition: transform 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-img-wrapper {
            width: 100%;
            height: 200px;
            background-color: var(--light-red);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .product-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-img-placeholder {
            font-size: 45px;
        }

        .product-name { font-weight: bold; margin-bottom: 8px; }
        .product-price { color: var(--accent-gold); font-weight: bold; margin-bottom: 15px; }

        .order-btn {
            display: inline-block;
            text-decoration: none;
            background-color: var(--dark-red);
            color: white;
            padding: 8px 30px;
            border-radius: 20px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .order-btn:hover {
            background-color: #ff1a1a;
        }

        .socials-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-link {
            text-decoration: none;
            background: white;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            color: var(--text-color);
            transition: all 0.3s;
        }

        .social-link:hover {
            background: var(--light-red);
            color: var(--dark-red);
            border-color: var(--primary-red);
        }

        footer {
            background-color: var(--light-red);
            text-align: center;
            padding: 40px;
            margin-top: 60px;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="#" class="logo">Sticky Shop ✨</a>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#shop">Shop</a></li>
            </ul>
        </div>
    </header>

    <main class="container">
        <div class="hero">
            <h1>Glow Your Own Way ✨</h1>
            <p>High-quality beauty essentials tailored for your perfect look.</p>
            <div class="socials-container" id="socials-list">
                <!-- Social links generate dynamically from admin panel -->
            </div>
        </div>

        <section id="shop">
            <h2 style="text-align: center; margin-bottom: 30px; color: var(--dark-red);">Our Collection</h2>
            <div id="product-container">
                <!-- Products load dynamically -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Sticky Shop. All Rights Reserved.</p>
    </footer>

    <script>
        var defaultProducts = [
            { id: 1, name: "Hydrating Velvet Lip Gloss", price: "1,200 DA", icon: "💄" },
            { id: 2, name: "Soft Glow Powder Blush", price: "1,500 DA", icon: "✨" },
            { id: 3, name: "Glow Vitamin C Serum", price: "2,200 DA", icon: "🌸" }
        ];

        if (!localStorage.getItem('sticky_products')) {
            localStorage.setItem('sticky_products', JSON.stringify(defaultProducts));
        }

        renderStorefront();

        function renderStorefront() {
            var products = JSON.parse(localStorage.getItem('sticky_products')) || [];
            var container = document.getElementById('product-container');
            container.innerHTML = "";

            products.forEach(function(prod) {
                var card = document.createElement('div');
                card.className = 'product-card';
                
                var imgContent = prod.image ? `<img src="${prod.image}" alt="${prod.name}">` : `<div class="product-img-placeholder">${prod.icon || '✨'}</div>`;
                var ownerEmail = localStorage.getItem('sticky_owner_email') || "contact@stickyshop.com";
                
                var orderMailto = "mailto:" + ownerEmail + "?subject=" + encodeURIComponent("Order: " + prod.name) + "&body=" + encodeURIComponent("Hello! I would like to order:\n\nProduct: " + prod.name + "\nPrice: " + prod.price + "\n\nPlease let me know how to proceed. Thank you!");

                card.innerHTML = `
                    <div class="product-img-wrapper">${imgContent}</div>
                    <div class="product-name">${prod.name}</div>
                    <div class="product-price">${prod.price}</div>
                    <a href="${orderMailto}" class="order-btn">Order 🛒</a>
                `;
                container.appendChild(card);
            });

            var socialsContainer = document.getElementById('socials-list');
            socialsContainer.innerHTML = "";
            var instagram = localStorage.getItem('sticky_owner_instagram');
            var tiktok = localStorage.getItem('sticky_owner_tiktok');

            if (instagram) {
                socialsContainer.innerHTML += `<a href="${instagram}" target="_blank" class="social-link">📸 Instagram</a>`;
            }
            if (tiktok) {
                socialsContainer.innerHTML += `<a href="${tiktok}" target="_blank" class="social-link">🎵 TikTok</a>`;
            }
        }

        window.addEventListener('storage', function() {
            renderStorefront();
        });
    </script>
</body>
</html>
